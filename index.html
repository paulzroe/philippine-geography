<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Philippines — Tap to Watch</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Philippines">
<meta name="theme-color" content="#062831">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700;9..144,900&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" crossorigin="">

<style>
  :root{
    --sea-1:#0c4a5c; --sea-2:#0a3645; --sea-3:#062831;
    --land:#519d6a; --shore:#bfeede; --sand:#f7efdd;
    --sun:#fcd116; --sun-deep:#f0a500;
    --coral:#ec5a3f; --coral-deep:#c8412a;
    --ink:#06262f; --ink-soft:#46626a;
    --cloud:#ffffff; --cloud-2:#fbf7ee; --cloud-3:#f3ead7;
    --display:'Fraunces', ui-serif, Georgia, 'Times New Roman', serif;
    --sans:'Plus Jakarta Sans', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
    --glass:rgba(7,40,50,.88);
    --glass-line:rgba(255,255,255,.13);
  }

  *{ box-sizing:border-box; margin:0; padding:0; }
  html,body{ height:100%; }
  body{
    font-family:var(--sans);
    background:var(--sea-3);
    color:var(--ink);
    overflow:hidden;
    -webkit-font-smoothing:antialiased;
    text-rendering:optimizeLegibility;
    -webkit-tap-highlight-color:transparent;
    -webkit-touch-callout:none;
    user-select:none;
  }

  /* ---------- Map ---------- */
  #map{
    position:absolute; inset:0;
    background:
      radial-gradient(130% 100% at 26% 8%, #1a728a 0%, #0e5266 34%, #0a3a49 66%, #062831 100%);
  }
  .leaflet-container{ background:transparent; font-family:var(--sans); outline:none; }
  .leaflet-container a{ color:var(--coral); }

  /* island shapes drawn from embedded geometry — no external tiles */
  /* No blur/drop-shadow filters here: SVG filters on complex coastlines force
     constant repaints and are the main battery drain. A wide soft stroke gives
     the same shallow-water halo for free. */
  .ph-glow path{ stroke:var(--shore); stroke-width:7; fill:none; stroke-opacity:.28; stroke-linejoin:round; stroke-linecap:round; }
  .ph-land path{
    stroke:var(--sand); stroke-width:.9; fill:var(--land); fill-opacity:1; stroke-linejoin:round;
  }

  /* ---------- Pins ---------- */
  .pin{
    position:absolute; inset:0;
    animation:pinIn .55s cubic-bezier(.2,.75,.3,1) both;
    animation-delay:var(--d,0ms);
    cursor:pointer;
  }
  @keyframes pinIn{ from{ opacity:0; transform:translateY(-14px) scale(.55); } to{ opacity:1; transform:none; } }

  .pin__rays{
    position:absolute; left:50%; top:30px; width:60px; height:60px;
    transform:translate(-50%,-50%) scale(.4);
    background:repeating-conic-gradient(from 0deg, var(--sun) 0 5deg, transparent 5deg 45deg);
    -webkit-mask:radial-gradient(circle, transparent 14px, #000 16px, #000 27px, transparent 29px);
    mask:radial-gradient(circle, transparent 14px, #000 16px, #000 27px, transparent 29px);
    opacity:0; transition:opacity .35s ease, transform .35s ease;
    pointer-events:none;
  }
  .pin__pulse{
    position:absolute; left:50%; top:30px; width:26px; height:26px;
    transform:translate(-50%,-50%); border-radius:50%;
    background:var(--coral); opacity:0; pointer-events:none;
  }
  .pin__dot{
    position:absolute; left:50%; top:30px; width:26px; height:26px;
    transform:translate(-50%,-50%);
    border-radius:50%;
    background:radial-gradient(circle at 36% 30%, #ff9077, var(--coral) 58%, var(--coral-deep));
    border:2.5px solid #fff;
    box-shadow:0 7px 16px rgba(3,20,28,.5), inset 0 1px 1px rgba(255,255,255,.5);
    transition:transform .25s cubic-bezier(.2,.8,.3,1);
  }
  .pin__dot::after{
    content:""; position:absolute; left:50%; top:50%; width:7px; height:7px;
    transform:translate(-50%,-50%); border-radius:50%; background:#fff; opacity:.95;
  }
  .pin__label{
    position:absolute; left:50%; top:49px; transform:translateX(-50%);
    background:rgba(255,255,255,.94);
    color:var(--ink);
    font:600 12px/1 var(--sans);
    letter-spacing:.01em;
    padding:5px 9px; border-radius:8px; white-space:nowrap;
    box-shadow:0 4px 12px rgba(3,20,28,.28);
    pointer-events:none;
    transition:background .25s ease, color .25s ease, transform .25s ease;
  }
  .pin-wrap:hover .pin__dot{ transform:translate(-50%,-50%) scale(1.16); }
  .pin-wrap:hover .pin__label{ transform:translateX(-50%) translateY(-1px); }

  .pin.is-active .pin__dot{ transform:translate(-50%,-50%) scale(1.22); }
  .pin.is-active .pin__label{ background:var(--ink); color:#fff; }
  /* Finite animations only — infinite spin/pulse keeps the compositor awake
     and drains battery while a pin stays selected. */
  .pin.is-active .pin__rays{ opacity:.95; transform:translate(-50%,-50%) scale(1); }
  .pin.is-active .pin__pulse{ animation:pulse 1.6s ease-out 2; }
  @keyframes pulse{ 0%{ opacity:.5; transform:translate(-50%,-50%) scale(1);} 70%{ opacity:0; transform:translate(-50%,-50%) scale(3.4);} 100%{ opacity:0; } }

  /* ---------- Sun glyph (header) ---------- */
  .sun{ position:relative; width:40px; height:40px; flex:none; }
  .sun__rays{
    position:absolute; inset:0;
    background:repeating-conic-gradient(from 0deg, var(--sun) 0 6deg, transparent 6deg 45deg);
    -webkit-mask:radial-gradient(circle, transparent 9px, #000 10px, #000 18px, transparent 19px);
    mask:radial-gradient(circle, transparent 9px, #000 10px, #000 18px, transparent 19px);
  }
  .sun__core{
    position:absolute; left:50%; top:50%; width:18px; height:18px; transform:translate(-50%,-50%);
    border-radius:50%; background:radial-gradient(circle at 35% 30%, #ffe680, var(--sun) 58%, var(--sun-deep));
  }

  /* ---------- HUD ---------- */
  .hud{
    position:absolute; z-index:500;
    top:calc(env(safe-area-inset-top,0px) + 18px);
    left:calc(env(safe-area-inset-left,0px) + 18px);
    display:flex; align-items:center; gap:14px;
    padding:11px 18px 11px 13px;
    background:var(--glass);
    border:1px solid var(--glass-line);
    border-radius:18px;
    box-shadow:0 12px 34px rgba(0,0,0,.28);
    color:#fff;
  }
  .hud__text{ display:flex; flex-direction:column; }
  .hud__eyebrow{ font-size:10px; letter-spacing:.24em; text-transform:uppercase; color:var(--sun); font-weight:700; margin-bottom:3px; }
  .hud__title{ font-family:var(--display); font-weight:900; font-size:25px; line-height:.95; letter-spacing:-.02em; }

  /* ---------- Places button + panel ---------- */
  .ghost-btn{
    position:absolute; z-index:500;
    top:calc(env(safe-area-inset-top,0px) + 18px);
    right:calc(env(safe-area-inset-right,0px) + 18px);
    display:flex; align-items:center; gap:9px;
    padding:12px 16px;
    background:var(--glass);
    border:1px solid var(--glass-line);
    border-radius:14px;
    box-shadow:0 12px 34px rgba(0,0,0,.28);
    color:#fff; font:600 14px var(--sans); cursor:pointer;
  }
  .ghost-btn svg{ display:block; }
  .ghost-btn:active{ transform:scale(.97); }

  .panel{
    position:absolute; top:0; right:0; z-index:700;
    height:100%; width:min(370px, 86vw);
    background:linear-gradient(180deg, var(--cloud-2), var(--cloud-3));
    transform:translateX(101%);
    transition:transform .42s cubic-bezier(.22,.61,.36,1);
    box-shadow:-22px 0 60px rgba(0,0,0,.3);
    display:flex; flex-direction:column;
    padding:calc(env(safe-area-inset-top,0px) + 20px) 18px 18px;
  }
  .panel.is-open{ transform:none; }
  .panel__head{ display:flex; align-items:baseline; justify-content:space-between; padding:0 6px 14px; }
  .panel__title{ font-family:var(--display); font-weight:700; font-size:24px; color:var(--ink); letter-spacing:-.01em; }
  .panel__sub{ font-size:11px; letter-spacing:.18em; text-transform:uppercase; color:var(--ink-soft); }
  .panel__list{ overflow-y:auto; -webkit-overflow-scrolling:touch; display:flex; flex-direction:column; gap:4px; padding-bottom:20px; }
  .place-row{
    display:flex; align-items:center; gap:13px;
    width:100%; text-align:left;
    padding:13px 12px; border:none; border-radius:13px;
    background:transparent; cursor:pointer; color:var(--ink);
    transition:background .18s ease;
  }
  .place-row:hover{ background:rgba(236,90,63,.09); }
  .place-row:active{ background:rgba(236,90,63,.16); }
  .place-row__dot{
    width:14px; height:14px; flex:none; border-radius:50%;
    background:radial-gradient(circle at 36% 30%, #ff9077, var(--coral) 60%, var(--coral-deep));
    box-shadow:0 2px 5px rgba(200,65,42,.5);
  }
  .place-row__name{ font:600 16px var(--sans); }
  .place-row__region{ display:block; font-size:11px; letter-spacing:.14em; text-transform:uppercase; color:var(--ink-soft); margin-top:2px; }
  .place-row__go{ margin-left:auto; color:var(--coral); opacity:.5; }

  /* ---------- Scrim ---------- */
  .scrim{
    position:absolute; inset:0; z-index:600;
    background:rgba(4,18,24,.5);
    opacity:0; pointer-events:none; transition:opacity .3s ease;
  }
  .scrim.is-on{ opacity:1; pointer-events:auto; }

  /* ---------- Video modal ---------- */
  .modal{
    position:fixed; inset:0; z-index:900;
    display:flex; align-items:center; justify-content:center;
    padding:max(22px, env(safe-area-inset-top,0px)) 22px;
    opacity:0; pointer-events:none; transition:opacity .3s ease;
  }
  .modal.is-open{ opacity:1; pointer-events:auto; }
  .modal__backdrop{ position:absolute; inset:0; background:rgba(4,16,22,.8); }
  .card{
    position:relative; width:min(880px, 100%); max-height:92vh; overflow:auto;
    background:var(--cloud); border-radius:22px;
    box-shadow:0 36px 90px rgba(0,0,0,.5);
    transform:scale(.95) translateY(10px);
    transition:transform .34s cubic-bezier(.22,.61,.36,1);
  }
  .modal.is-open .card{ transform:none; }
  .card__media{ position:relative; aspect-ratio:16/9; background:#05161c; border-radius:22px 22px 0 0; overflow:hidden; }
  .card__media video, .card__media iframe{ position:absolute; inset:0; width:100%; height:100%; border:0; display:block; background:#05161c; }
  .card__close{
    position:absolute; top:14px; right:14px; z-index:3;
    width:44px; height:44px; border:none; border-radius:50%;
    background:rgba(8,28,35,.85); color:#fff; cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    box-shadow:0 4px 14px rgba(0,0,0,.3); transition:background .2s ease, transform .2s ease;
  }
  .card__close:hover{ background:rgba(8,28,35,.85); }
  .card__close:active{ transform:scale(.92); }
  .card__body{ padding:22px 26px 26px; }
  .card__eyebrow{ font-size:11px; letter-spacing:.22em; text-transform:uppercase; color:var(--coral-deep); font-weight:700; }
  .card__title{ font-family:var(--display); font-weight:700; font-size:clamp(26px,4.4vw,34px); line-height:1.05; letter-spacing:-.015em; margin:6px 0 10px; color:var(--ink); }
  .card__desc{ font-size:16px; line-height:1.55; color:var(--ink-soft); max-width:60ch; }

  /* ---------- Leaflet zoom control ---------- */
  .leaflet-control-zoom{ border:none !important; box-shadow:0 12px 34px rgba(0,0,0,.28) !important; border-radius:14px !important; overflow:hidden; margin:0 !important; }
  .leaflet-bottom.leaflet-right{ bottom:calc(env(safe-area-inset-bottom,0px) + 18px); right:calc(env(safe-area-inset-right,0px) + 18px); }
  .leaflet-control-zoom a{
    background:var(--glass) !important; color:#fff !important; border:none !important;
    border-bottom:1px solid var(--glass-line) !important;
    width:42px !important; height:42px !important; line-height:42px !important; font-size:21px !important;
  }
  .leaflet-control-zoom a:last-child{ border-bottom:none !important; }
  .leaflet-control-zoom a:hover{ background:rgba(10,58,73,.8) !important; }

  /* ---------- attribution ---------- */
  .attrib{
    position:absolute; z-index:500;
    left:calc(env(safe-area-inset-left,0px) + 18px);
    bottom:calc(env(safe-area-inset-bottom,0px) + 16px);
    font-size:11px; letter-spacing:.04em; color:rgba(255,255,255,.55);
    pointer-events:none;
  }

  :focus-visible{ outline:3px solid var(--sun); outline-offset:2px; border-radius:6px; }
  .leaflet-marker-icon:focus-visible{ outline:3px solid var(--sun); outline-offset:4px; }

  @media (max-width:560px){
    .hud__title{ font-size:21px; }
    .ghost-btn span{ display:none; }
    .ghost-btn{ padding:12px; }
    .card__body{ padding:18px 18px 22px; }
  }

  @media (prefers-reduced-motion: reduce){
    *{ animation-duration:.001ms !important; animation-iteration-count:1 !important; transition-duration:.01ms !important; }
    .pin{ animation:none; }
  }
</style>
</head>
<body>
  <div id="map" role="application" aria-label="Map of the Philippines with places you can tap to watch a video"></div>

  <header class="hud">
    <span class="sun" aria-hidden="true"><span class="sun__rays"></span><span class="sun__core"></span></span>
    <span class="hud__text">
      <span class="hud__eyebrow">Tap a pin to play</span>
      <span class="hud__title">Philippines</span>
    </span>
  </header>

  <button class="ghost-btn" id="placesBtn" aria-haspopup="true" aria-expanded="false" aria-controls="panel">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
      <path d="M8 6h13M8 12h13M8 18h13" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      <circle cx="3.5" cy="6" r="1.6" fill="currentColor"/><circle cx="3.5" cy="12" r="1.6" fill="currentColor"/><circle cx="3.5" cy="18" r="1.6" fill="currentColor"/>
    </svg>
    <span>Places</span>
  </button>

  <div class="scrim" id="scrim"></div>

  <aside class="panel" id="panel" role="dialog" aria-label="All places" aria-modal="false">
    <div class="panel__head">
      <span class="panel__title">Places</span>
      <span class="panel__sub" id="placeCount"></span>
    </div>
    <div class="panel__list" id="placeList"></div>
  </aside>

  <div class="modal" id="modal" role="dialog" aria-modal="true" aria-labelledby="cardTitle">
    <div class="modal__backdrop" id="modalBackdrop"></div>
    <div class="card" role="document">
      <div class="card__media" id="cardMedia"></div>
      <button class="card__close" id="cardClose" aria-label="Close video">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M6 6l12 12M18 6L6 18" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/></svg>
      </button>
      <div class="card__body">
        <div class="card__eyebrow" id="cardRegion"></div>
        <h2 class="card__title" id="cardTitle"></h2>
        <p class="card__desc" id="cardDesc"></p>
      </div>
    </div>
  </div>

  <div class="attrib">Boundaries: Natural Earth</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js" crossorigin=""></script>

/* =========================================================================
   3) APP
   ========================================================================= */
(function(){
  if (typeof L === "undefined"){
    document.getElementById("map").innerHTML =
      '<div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:#fff;font-family:var(--sans);padding:24px;text-align:center;">Map engine could not load. Please open this page with an internet connection the first time.</div>';
    return;
  }

  const map = L.map("map", {
    zoomControl:false,
    attributionControl:false,
    zoomSnap:0.25,
    wheelPxPerZoomLevel:140,
    minZoom:4, maxZoom:9,
    maxBoundsViscosity:0.9,
  });
  L.control.zoom({ position:"bottomright" }).addTo(map);

  // glow halo under the land, then the crisp land on top
  L.geoJSON(PH_GEO, { interactive:false, style:()=>({ className:"ph-glow", color:"#bfeede", weight:7, fill:false, opacity:.28 }) }).addTo(map);
  const land = L.geoJSON(PH_GEO, { interactive:false, style:()=>({ className:"ph-land", color:"#f7efdd", weight:.9, fillColor:"#519d6a", fillOpacity:1 }) }).addTo(map);

  const bounds = land.getBounds();
  map.fitBounds(bounds, { padding:[36,36] });
  map.setMaxBounds(bounds.pad(0.28));
  // don't let users zoom out past the whole country
  map.whenReady(()=> map.setMinZoom(Math.max(4, map.getZoom() - 0.25)));

  // ----- markers -----
  const markers = [];
  PLACES.forEach((p, i)=>{
    const html =
      '<div class="pin" style="--d:'+(i*55)+'ms">' +
        '<span class="pin__pulse"></span>' +
        '<span class="pin__rays"></span>' +
        '<span class="pin__dot"></span>' +
        '<span class="pin__label">'+ p.name +'</span>' +
      '</div>';
    const icon = L.divIcon({ className:"pin-wrap", html, iconSize:[120,86], iconAnchor:[60,30] });
    const m = L.marker([p.lat, p.lng], { icon, keyboard:true, riseOnHover:true, alt:"Play video about "+p.name, title:p.name });
    m.on("click", ()=> openPlace(i));
    m.on("keypress", (e)=>{ if(e.originalEvent && (e.originalEvent.key==="Enter"||e.originalEvent.key===" ")) openPlace(i); });
    m.addTo(map);
    markers.push(m);
  });

  // ----- elements -----
  const modal      = document.getElementById("modal");
  const media      = document.getElementById("cardMedia");
  const elRegion   = document.getElementById("cardRegion");
  const elTitle    = document.getElementById("cardTitle");
  const elDesc     = document.getElementById("cardDesc");
  const scrim      = document.getElementById("scrim");
  const panel      = document.getElementById("panel");
  const placesBtn  = document.getElementById("placesBtn");
  let lastFocus = null;

  // ----- build the side list -----
  const list = document.getElementById("placeList");
  document.getElementById("placeCount").textContent = PLACES.length + " places";
  PLACES.forEach((p, i)=>{
    const row = document.createElement("button");
    row.className = "place-row";
    row.innerHTML =
      '<span class="place-row__dot"></span>' +
      '<span><span class="place-row__name">'+p.name+'</span>' +
      '<span class="place-row__region">'+p.region+'</span></span>' +
      '<span class="place-row__go" aria-hidden="true">' +
        '<svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M9 6l6 6-6 6" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>' +
      '</span>';
    row.addEventListener("click", ()=>{ closePanel(); setTimeout(()=>openPlace(i), 180); });
    list.appendChild(row);
  });

  // ----- video embed builder -----
  function buildMedia(video){
    media.innerHTML = "";
    const yt = video && video.match(/(?:youtube\.com\/(?:watch\?v=|embed\/|shorts\/|v\/)|youtu\.be\/)([\w-]{11})/);
    const vm = video && video.match(/vimeo\.com\/(?:video\/)?(\d+)/);
    if (yt){
      const f = document.createElement("iframe");
      f.src = "https://www.youtube-nocookie.com/embed/"+yt[1]+"?autoplay=1&rel=0&playsinline=1&modestbranding=1";
      f.allow = "autoplay; encrypted-media; picture-in-picture; fullscreen";
      f.setAttribute("allowfullscreen","");
      media.appendChild(f);
    } else if (vm){
      const f = document.createElement("iframe");
      f.src = "https://player.vimeo.com/video/"+vm[1]+"?autoplay=1&playsinline=1";
      f.allow = "autoplay; fullscreen; picture-in-picture";
      f.setAttribute("allowfullscreen","");
      media.appendChild(f);
    } else if (video){
      const v = document.createElement("video");
      v.src = video; v.controls = true; v.autoplay = true; v.playsInline = true;
      v.setAttribute("playsinline",""); v.setAttribute("webkit-playsinline","");
      v.preload = "metadata";
      media.appendChild(v);
      const go = v.play(); if (go && go.catch) go.catch(()=>{});
    }
  }

  // ----- open / close place -----
  function openPlace(i){
    const p = PLACES[i];
    // sun highlight
    document.querySelectorAll(".pin.is-active").forEach(el=> el.classList.remove("is-active"));
    const el = markers[i].getElement();
    const pin = el && el.querySelector(".pin");
    if (pin) pin.classList.add("is-active");

    map.panTo([p.lat, p.lng], { animate:true, duration:.6 });

    elRegion.textContent = p.region;
    elTitle.textContent  = p.name;
    elDesc.textContent   = p.blurb;

    buildMedia(p.video);

    lastFocus = document.activeElement;
    modal.classList.add("is-open");
    scrim.classList.add("is-on");
    setTimeout(()=> document.getElementById("cardClose").focus(), 60);
  }

  function closeModal(){
    modal.classList.remove("is-open");
    if (!panel.classList.contains("is-open")) scrim.classList.remove("is-on");
    media.innerHTML = ""; // stops any playback
    document.querySelectorAll(".pin.is-active").forEach(el=> el.classList.remove("is-active"));
    if (lastFocus && lastFocus.focus) lastFocus.focus();
  }

  // ----- panel -----
  function openPanel(){
    panel.classList.add("is-open");
    scrim.classList.add("is-on");
    placesBtn.setAttribute("aria-expanded","true");
  }
  function closePanel(){
    panel.classList.remove("is-open");
    if (!modal.classList.contains("is-open")) scrim.classList.remove("is-on");
    placesBtn.setAttribute("aria-expanded","false");
  }

  // ----- wiring -----
  placesBtn.addEventListener("click", ()=> panel.classList.contains("is-open") ? closePanel() : openPanel());
  document.getElementById("cardClose").addEventListener("click", closeModal);
  document.getElementById("modalBackdrop").addEventListener("click", closeModal);
  scrim.addEventListener("click", ()=>{
    if (modal.classList.contains("is-open")) closeModal();
    else if (panel.classList.contains("is-open")) closePanel();
  });
  document.addEventListener("keydown", (e)=>{
    if (e.key === "Escape"){
      if (modal.classList.contains("is-open")) closeModal();
      else if (panel.classList.contains("is-open")) closePanel();
    }
  });

  // mark loaded (kept simple; pins animate on creation)
  document.body.classList.add("loaded");
})();
</script>
